# Mock LLM responses for dev feedback loop
# Uso: wtb run backlog --provider mock
#
# Router usa keywords do prompt para selecionar a resposta correta:
#   extraction  → prompt contém "TRANSCRIÇÃO"
#   epics       → prompt contém "complexity" (campo do formato de épicos)
#   stories     → prompt contém "Como engenheiro, quero" (exemplo de história)
#   criteria    → prompt contém "Critério 1 com métrica" (exemplo de critério)
#   technologies → prompt contém "Use nomes canônicos"
#   deep_dive   → prompt contém "why_in_this_story"

