          "rationale": "Padrão: WAL cresce ~50 MB por execução warn consecutiva — sem intervenção vira critical em 1–2h"
        },
        {
          "probe": "airbyte",
          "window": 4,
          "consecutive_status": "warn",
          "escalate_to": "warn",
          "signal": "airbyte: {n} syncs lentos consecutivos → revisar schedule ou warehouse sizing",
          "rationale": "Duração acima de threshold por 4 ciclos indica degradação estrutural, não pico pontual"
        },
        {
          "probe": "kafka-status",
          "window": 2,
          "consecutive_status": "critical",
          "escalate_to": "critical",
          "signal": "kafka-status: {n} execuções críticas consecutivas → lag acima de 10000, risco de backpressure em cascata",
