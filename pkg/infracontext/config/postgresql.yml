provider:
  id: postgresql
  name: "PostgreSQL (psql)"
  description: "Infrastructure context from PostgreSQL via psql CLI (replication, connections, tables)"

  transport:
    primary: cli
    cli:
      command: "psql"
      timeout: "30s"
      available_check: ["--version"]

  auth:
    credentials:
      - name: "PG_CONNECTION_STRING"
        description: "PostgreSQL connection string (postgresql://user:pass@host:port/db)"
    resolve_order: ["env", "aws-ssm", "encrypted-file"]
    setup_guide: |
      Configure PostgreSQL connection:
        export PG_CONNECTION_STRING='postgresql://user:password@host:5432/dbname'
      Or from AWS SSM:
        aws ssm put-parameter --name /wtb/PG_CONNECTION_STRING \
          --value 'postgresql://...' --type SecureString

  defaults:
    ttl: "2m"
    resource_types: [database_info, replication_slots, replication_stats, connections, tables]

  fetch_steps:
    # Step 1: Database info + version
    - id: database_info
      cli_args:
        - "{{.PG_CONNECTION_STRING}}"
        - "-t"
        - "-A"
        - "-c"
        - >-
          SELECT json_build_object('items', json_build_array(row_to_json(t)))
          FROM (SELECT current_database() as name, version() as version,
          pg_postmaster_start_time() as started_at,
          pg_database_size(current_database()) as size_bytes,
          (SELECT count(*) FROM pg_stat_activity) as active_connections,
          (SELECT setting::int FROM pg_settings WHERE name = 'max_connections') as max_connections) t
      mapping:
        topology:
          source_path: "items"
          transform: "pg_database_info_to_topology"
        metrics:
          source_path: "items"
          transform: "pg_database_info_to_metrics"

    # Step 2: Replication slots (critical for CDC investigation)
    - id: replication_slots
      cli_args:
        - "{{.PG_CONNECTION_STRING}}"
        - "-t"
        - "-A"
        - "-c"
        - >-
          SELECT json_build_object('items', COALESCE(json_agg(row_to_json(t)), '[]'::json))
          FROM (SELECT slot_name, plugin, slot_type, active, restart_lsn,
          confirmed_flush_lsn, wal_status,
          pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) as slot_lag_bytes
          FROM pg_replication_slots) t
      mapping:
        topology:
          source_path: "items"
          transform: "pg_replication_slots_to_topology"
        health:
          source_path: "items"
          transform: "pg_replication_slots_to_health"

    # Step 3: Replication stats (WAL senders)
    - id: replication_stats
      cli_args:
        - "{{.PG_CONNECTION_STRING}}"
        - "-t"
        - "-A"
        - "-c"
        - >-
          SELECT json_build_object('items', COALESCE(json_agg(row_to_json(t)), '[]'::json))
          FROM (SELECT pid, usename, application_name, client_addr::text, state,
          sent_lsn::text, write_lsn::text, flush_lsn::text, replay_lsn::text,
          pg_wal_lsn_diff(sent_lsn, replay_lsn) as replay_lag_bytes,
          sync_state FROM pg_stat_replication) t
      optional: true
      mapping:
        topology:
          source_path: "items"
          transform: "pg_replication_stats_to_topology"
        health:
          source_path: "items"
          transform: "pg_replication_stats_to_health"

    # Step 4: Active connections
    - id: connections
      cli_args:
        - "{{.PG_CONNECTION_STRING}}"
        - "-t"
        - "-A"
        - "-c"
        - >-
          SELECT json_build_object('items', COALESCE(json_agg(row_to_json(t)), '[]'::json))
          FROM (SELECT datname, usename, application_name, client_addr::text,
          state, wait_event_type, wait_event,
          LEFT(query, 200) as query, backend_start,
          EXTRACT(EPOCH FROM (now() - state_change))::numeric(10,1) as state_duration_seconds
          FROM pg_stat_activity
          WHERE pid != pg_backend_pid() AND state IS NOT NULL
          ORDER BY state_change DESC LIMIT 50) t
      optional: true
      mapping:
        topology:
          source_path: "items"
          transform: "pg_connections_to_topology"
        metrics:
          source_path: "items"
          transform: "pg_connections_to_metrics"

    # Step 5: Table stats
    - id: tables
      cli_args:
        - "{{.PG_CONNECTION_STRING}}"
        - "-t"
        - "-A"
        - "-c"
        - >-
          SELECT json_build_object('items', COALESCE(json_agg(row_to_json(t)), '[]'::json))
          FROM (SELECT schemaname, relname, n_tup_ins, n_tup_upd, n_tup_del,
          n_live_tup, n_dead_tup, last_vacuum, last_autovacuum,
          last_analyze, last_autoanalyze,
          pg_total_relation_size(quote_ident(schemaname)||'.'||quote_ident(relname)) as total_size_bytes
          FROM pg_stat_user_tables
          ORDER BY pg_total_relation_size(quote_ident(schemaname)||'.'||quote_ident(relname)) DESC
          LIMIT 50) t
      optional: true
      mapping:
        topology:
          source_path: "items"
          transform: "pg_tables_to_topology"
        metrics:
          source_path: "items"
          transform: "pg_tables_to_metrics"
