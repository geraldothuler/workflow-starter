provider:
  id: aws-ssm
  name: "AWS Systems Manager Parameter Store"

  resolve:
    command: "aws"
    args: ["ssm", "get-parameter", "--name", "/wtb/{{.name}}", "--with-decryption", "--query", "Parameter.Value", "--output", "text"]
    parse: "trim"
    timeout: "15s"

  store:
    command: "aws"
    args: ["ssm", "put-parameter", "--name", "/wtb/{{.name}}", "--value", "{{.value}}", "--type", "SecureString", "--overwrite"]
    timeout: "15s"

  available:
    command: "aws"
    args: ["sts", "get-caller-identity"]
    timeout: "10s"

  setup_guide: |
    AWS SSM Parameter Store setup:
    1. Install AWS CLI: https://aws.amazon.com/cli/
    2. Configure credentials: aws configure
    3. Ensure IAM permissions:
       - ssm:GetParameter
       - ssm:PutParameter
    4. Parameters stored as SecureString under /wtb/ prefix
