provider:
  id: pass
  name: "Unix Password Store (pass)"

  resolve:
    command: "pass"
    args: ["show", "wtb/{{.name}}"]
    parse: "first_line"

  store:
    command: "pass"
    args: ["insert", "-f", "wtb/{{.name}}"]
    input: "{{.value}}\n{{.value}}\n"

  available:
    command: "pass"
    args: ["ls"]

  setup_guide: |
    Install password-store:
    - macOS: brew install pass
    - Ubuntu/Debian: apt install pass
    - Fedora: dnf install pass
    - Init: gpg --gen-key && pass init <gpg-id>
    - Docs: https://www.passwordstore.org/
