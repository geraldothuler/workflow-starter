provider:
  id: github-cli
  name: "GitHub CLI (gh)"
  type: session

  session:
    ttl: "24h"
    cache_key: "github-token"

  pre_check:
    command: "gh"
    args: ["auth", "status"]

  refresh:
    command: "gh"
    args: ["auth", "login", "--web"]
    interactive: true
    timeout: "120s"

  resolve:
    command: "gh"
    args: ["auth", "token"]
    parse: "trim"

  available:
    command: "gh"
    args: ["--version"]

  setup_guide: |
    1. Install: brew install gh
    2. First login: gh auth login --web
    3. MFA: approve via GitHub Mobile App
