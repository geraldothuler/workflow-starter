provider:
  id: 1password
  name: "1Password CLI"

  resolve:
    command: "op"
    args: ["read", "op://wtb/{{.name}}/credential"]
    parse: "trim"

  store:
    command: "op"
    args: ["item", "create", "--category=login", "--title={{.name}}", "--vault=wtb", "credential={{.value}}"]
    parse: "trim"

  available:
    command: "op"
    args: ["whoami"]

  setup_guide: |
    1Password CLI setup:
    1. Install: https://developer.1password.com/docs/cli/get-started
       - macOS: brew install 1password-cli
       - Linux: see install docs
    2. Sign in: eval $(op signin)
    3. Create vault: op vault create wtb
    4. Docs: https://developer.1password.com/docs/cli
