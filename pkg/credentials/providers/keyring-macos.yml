provider:
  id: keyring-macos
  name: "macOS Keychain"

  resolve:
    command: "security"
    args: ["find-generic-password", "-a", "wtb", "-s", "{{.name}}", "-w"]
    parse: "trim"

  store:
    command: "security"
    args: ["add-generic-password", "-a", "wtb", "-s", "{{.name}}", "-w", "{{.value}}", "-U"]

  available:
    command: "security"
    args: ["help"]

  setup_guide: |
    macOS Keychain is built-in. No installation needed.
    Credentials are stored in your login keychain.
    - Store: wtb credentials store <name> --provider keyring-macos
    - View: Keychain Access.app → search "wtb"
