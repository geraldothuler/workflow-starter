provider:
  id: keyring-linux
  name: "Linux Secret Service (GNOME Keyring / KDE Wallet)"

  resolve:
    command: "secret-tool"
    args: ["lookup", "application", "wtb", "key", "{{.name}}"]
    parse: "trim"

  store:
    command: "secret-tool"
    args: ["store", "--label", "wtb: {{.name}}", "application", "wtb", "key", "{{.name}}"]
    input: "{{.value}}"

  available:
    command: "secret-tool"
    args: ["--version"]

  setup_guide: |
    Linux Secret Service requires libsecret:
    - Ubuntu/Debian: apt install libsecret-tools
    - Fedora: dnf install libsecret
    - Arch: pacman -S libsecret
    - Requires a running Secret Service (GNOME Keyring or KDE Wallet)
