# anonymization_rules.yml — padrões proibidos em documentação pública
#
# Heuristic-First: regex determinístico, zero-LLM, custo $0.
# Falsos positivos intencionais: adicione no arquivo:
#   <!-- wtb-noguard: anonymization-in-docs — <justificativa> -->
#
# Evolução: adicione padrões sem recompilar o binário.

check: anonymization-in-docs
description: >
  Documentos em docs/ não devem conter identificadores internos de infraestrutura.
  Protege: IPs privados, hostnames internos, nomes de slots CDC, credenciais hardcoded.

scan:
  dirs:
    - docs
  extensions:
    - .html
    - .md
  recursive: true

patterns:
  - id: private-ip
    description: "Endereço IP privado RFC 1918 (10.x.x.x)"
    regex: "\\b10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}\\b"
    guidance: "Substitua por placeholder: <ip-interno>"

  - id: internal-hostname
    description: "Hostname interno da organização (.cobli.co)"
    regex: "\\b[\\w-]+\\.cobli\\.co\\b"
    guidance: "Use hostname genérico"

  - id: replication-slot-name
    description: "Nome de slot CDC (ex: airbyte_slot, cdc_slot)"
    regex: "\\b[a-z][a-z0-9_]*_slot\\b"
    guidance: "Use 'slot de replicação' sem identificador específico"

  - id: hardcoded-credential
    description: "Credencial hardcoded em atribuição (password=, api_key=)"
    regex: "(?i)(?:password|api_key|secret_key|access_token)\\s*=\\s*[^\\s<>{$'\"][^\\s<>]{7,}"
    guidance: "Use variáveis de ambiente ou placeholders"

  - id: personal-email
    description: "Email pessoal nominativo de colaborador (min 6 chars antes do @)"
    regex: "\\b[a-z][a-z0-9._%+-]{5,30}@cobli\\.co\\b"
    guidance: "Use endereço de time ou papel: team@cobli.co, ou remova"

  - id: slack-id
    description: "Slack user/channel/bot ID — começa com U/C/B seguido de dígito"
    regex: "\\b[UCB][0-9][A-Z0-9]{6,9}\\b"
    guidance: "Substitua por nome do canal ou papel: #canal, @role"
